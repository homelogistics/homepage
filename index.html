<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홈앤로지스틱스 | Home &amp; Logistics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f8f8f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      position: relative;
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .site-title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #1a2e5a;           /* 홈앤쇼핑 계열 짙은 네이비 */
      text-align: center;
      line-height: 1;
      font-stretch: condensed;
      user-select: none;
    }

    /* 공고 버튼 – 우측 상단 */
    .notice-btn {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #1a2e5a;
      background: none;
      border: none;
      padding: 4px 0;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .notice-btn:hover {
      color: #e8420a;
    }

    /* ── 히어로 (사진 영역) ── */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #dde3ec;
      min-height: 460px;
      position: relative;
      overflow: hidden;
    }

    /* 사진 준비 전 플레이스홀더 */
    .hero-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #8898aa;
      font-size: 15px;
    }
    .hero-placeholder svg {
      opacity: 0.4;
    }

    /* 사진이 있을 때: <img id="hero-img"> 태그를 활성화 */
    #hero-img {
      display: none;   /* 사진 추가 시 display:block 으로 변경 */
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    /* ── 푸터 ── */
    footer {
      background: #1a2e5a;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      line-height: 1.8;
      padding: 20px 24px;
      text-align: center;
    }
    footer a {
      color: rgba(255,255,255,0.9);
      text-decoration: underline;
    }
    footer a:hover { color: #fff; }
    footer .copy {
      margin-top: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
    }

    /* ── 공고 모달 오버레이 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 40px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 720px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #e8e8e8;
      background: #1a2e5a;
      color: #fff;
    }
    .modal-header h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    .modal-close:hover { color: #fff; }

    .modal-body {
      overflow-y: auto;
      flex: 1;
    }

    /* 공고 목록 테이블 */
    .notice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    .notice-table thead tr {
      background: #f0f4f8;
    }
    .notice-table th,
    .notice-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      text-align: left;
      white-space: nowrap;
    }
    .notice-table th {
      font-weight: 700;
      color: #444;
      font-size: 12px;
    }
    .notice-table td.title {
      white-space: normal;
      word-break: keep-all;
      color: #1a2e5a;
      font-weight: 600;
      cursor: pointer;
    }
    .notice-table td.title:hover { text-decoration: underline; }
    .notice-table td.date { color: #888; font-size: 12px; }
    .notice-table td.badge span {
      display: inline-block;
      background: #e8420a;
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 700;
    }
    .notice-table tbody tr:hover { background: #fafafa; }

    /* 공고 상세 뷰 (모달 내) */
    .notice-detail {
      display: none;
      padding: 24px;
    }
    .notice-detail.open { display: block; }
    .notice-detail h3 {
      font-size: 16px;
      font-weight: 700;
      color: #1a2e5a;
      margin-bottom: 8px;
    }
    .notice-detail .meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .notice-detail .content {
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }
    .back-btn {
      background: none;
      border: none;
      color: #1a2e5a;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }
    .back-btn:hover { text-decoration: underline; }

    .empty-notice {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .site-title { font-size: 20px; }
      .notice-btn { font-size: 11px; padding: 3px 9px; right: 12px; }
      .modal-overlay { padding: 40px 8px 20px; }
    }
  </style>
</head>
<body>

  <!-- ── 헤더 ── -->
  <header>
    <div class="site-title">홈앤로지스틱스</div>
    <button class="notice-btn" onclick="openModal()">공고</button>
  </header>

  <!-- ── 히어로 (물류센터 사진 영역) ── -->
  <main class="hero">
    <!-- 사진 추가 시: 아래 img 태그의 src 채우고 display:block 으로 변경하세요 -->
    <img id="hero-img" src="" alt="물류센터" />

    <!-- 사진 넣기 전 임시 안내 -->
    <div class="hero-placeholder" id="hero-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>물류센터 사진이 여기에 들어갑니다</span>
    </div>
  </main>

  <!-- ── 푸터 ── -->
  <footer>
    주식회사 홈앤로지스틱스 &nbsp;|&nbsp; 대표자: 김재진 &nbsp;|&nbsp; 사업자등록번호: 801-81-03559<br />
    경기도 화성시 만세구 양감면 토성로 624 &nbsp;|&nbsp; Tel. 031-8043-2505<br />
    <a href="privacy.html">개인정보처리방침</a>
    <div class="copy">© 2026 홈앤로지스틱스. All rights reserved.</div>
  </footer>

  <!-- ── 공고 모달 ── -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>공고</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body">

        <!-- 공고 목록 -->
        <div id="notice-list">
          <table class="notice-table">
            <thead>
              <tr>
                <th style="width:46px">번호</th>
                <th>제목</th>
                <th style="width:90px">등록일</th>
              </tr>
            </thead>
            <tbody id="notice-tbody">
              <!-- 공고가 있을 경우 예시 (실제 공고 추가 시 아래 방식으로 추가) -->
              <!--
              <tr>
                <td>1</td>
                <td class="title" onclick="openNotice(0)">2026년 하반기 채용 공고</td>
                <td class="date">2026.06.16</td>
              </tr>
              -->
            </tbody>
          </table>
          <div class="empty-notice" id="empty-msg">등록된 공고가 없습니다.</div>
        </div>

        <!-- 공고 상세 -->
        <div class="notice-detail" id="notice-detail">
          <button class="back-btn" onclick="backToList()">← 목록으로</button>
          <h3 id="detail-title"></h3>
          <div class="meta" id="detail-meta"></div>
          <div class="content" id="detail-content"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    /* ──────────────────────────────────────────
       공고 데이터 – 공고 추가 시 이 배열에 넣으세요
    ────────────────────────────────────────── */
    const notices = [
  {
    title: "TEST",
    date: "2026.06.16",
    content: `TEST1

TEST2`
  }
];

    /* 목록 렌더 */
    function renderList() {
      const tbody = document.getElementById('notice-tbody');
      const emptyMsg = document.getElementById('empty-msg');
      tbody.innerHTML = '';
      if (notices.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';
      notices.forEach((n, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${notices.length - i}</td>
          <td class="title" onclick="openNotice(${i})">${n.title}</td>
          <td class="date">${n.date}</td>`;
        tbody.appendChild(tr);
      });
    }

    /* 상세 보기 */
    function openNotice(idx) {
      const n = notices[idx];
      document.getElementById('detail-title').textContent = n.title;
      document.getElementById('detail-meta').textContent = '등록일: ' + n.date;
      document.getElementById('detail-content').textContent = n.content;
      document.getElementById('notice-list').style.display = 'none';
      document.getElementById('notice-detail').classList.add('open');
    }

    /* 목록으로 */
    function backToList() {
      document.getElementById('notice-detail').classList.remove('open');
      document.getElementById('notice-list').style.display = 'block';
    }

    /* 모달 열기/닫기 */
    function openModal() {
      backToList();
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    renderList();
  </script>

</body>
</html>
